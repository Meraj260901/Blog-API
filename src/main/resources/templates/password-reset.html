<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Reset Your Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f7;
            margin: 0;
            padding: 0;
        }
        .email-container {
            background: #ffffff;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h2 {
            color: #333;
        }
        p {
            font-size: 15px;
            color: #555;
        }
        a.button {
            display: inline-block;
            padding: 12px 20px;
            background: #0066ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }
        a.button:hover {
            background: #0052cc;
        }
    </style>
</head>
<body>
<div class="email-container">
    <h2>Hello, <span th:text="${userName}">User</span> 👋</h2>
    <p>We received a request to reset your password for your BlogApp account.</p>
    <p>Click the button below to reset it. This link will expire in 15 minutes.</p>
    <a th:href="${resetUrl}" class="button">Reset Password</a>
    <p>If you didn’t request this, you can safely ignore this email.</p>
    <p>Best,<br/>The BlogApp Team</p>
</div>
</body>
</html>
