<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify your account</title>
    <style>
        .container {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            font-family: Arial, sans-serif;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
        }
        .footer {
            font-size: 12px;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Welcome to BlogApp, <span th:text="${userName}">User</span>!</h2>
    <p>Click the button below to verify your account:</p>
    <a class="btn" th:href="${verificationUrl}">Verify Account</a>
    <p class="footer">If you didn’t request this, please ignore this email.</p>
</div>
</body>
</html>
